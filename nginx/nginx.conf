# =============================================================================
# nginx reverse-proxy — security hardened
#
# Responsibilities
# ─────────────────
# • Terminate TLS (cert paths wired in server block — swap in real certs)
# • Forward requests to the upstream FastAPI app on port 8000
# • Enforce security headers (covers F-02, F-03, F-04 from SECURITY_REPORT.md)
# • Rate-limit all endpoints and apply stricter limits to /validate
# • Hide server version information
# • Block common scanner / bad-UA requests
# • Restrict allowed HTTP methods
# =============================================================================

# ── Worker tuning ─────────────────────────────────────────────────────────────
worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ── Hide nginx version from error pages and Server header ─────────────────
    server_tokens off;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log  warn;

    # ── MIME / charset ────────────────────────────────────────────────────────
    include      mime.types;
    default_type application/octet-stream;
    charset      utf-8;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         application/json text/plain;

    # ── Request size limits (DoS mitigation) ──────────────────────────────────
    client_max_body_size      12m;   # max upload = 10 MB + multipart overhead
    client_body_timeout       15s;
    client_header_timeout     15s;
    send_timeout              15s;
    large_client_header_buffers 4 8k;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # Global: 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=global:10m  rate=30r/s;
    # Validate endpoint: 5 requests/second per IP (file processing is expensive)
    limit_req_zone $binary_remote_addr zone=validate:10m rate=5r/s;
    limit_req_status 429;

    # ── Upstream — FastAPI app ────────────────────────────────────────────────
    upstream app {
        server app:8000;
        keepalive 32;
    }

    # ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────
    server {
        listen      80;
        server_name _;
        return 301  https://$host$request_uri;
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen      443 ssl;
        server_name _;
        http2       on;

        # ── TLS certificates ──────────────────────────────────────────────────
        # Mount real certs via Docker volume or secrets.
        # For local development use the self-signed certs generated by
        # the companion script: scripts/gen_certs.sh
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # ── TLS hardening ─────────────────────────────────────────────────────
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       10m;
        ssl_session_tickets       off;
        ssl_stapling              on;
        ssl_stapling_verify       on;

        # ── Security headers (fix F-02 / F-03 / F-04) ────────────────────────
        add_header X-Content-Type-Options   "nosniff"                    always;
        add_header X-Frame-Options          "DENY"                       always;
        add_header Content-Security-Policy  "default-src 'none'; frame-ancestors 'none'" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy          "no-referrer"                always;
        add_header Permissions-Policy       "geolocation=(), microphone=()" always;
        add_header X-Request-ID             $request_id                  always;

        # ── Block common scanner / bad user-agents ────────────────────────────
        if ($http_user_agent ~* "(sqlmap|nikto|nmap|masscan|zgrab|python-requests/2\.2)") {
            return 403;
        }

        # ── Restrict HTTP methods globally ────────────────────────────────────
        if ($request_method !~ ^(GET|POST|HEAD|OPTIONS)$) {
            return 405;
        }

        # ── Global rate limit ─────────────────────────────────────────────────
        limit_req zone=global burst=60 nodelay;

        # ── /validate — stricter rate limit ───────────────────────────────────
        location ~ ^/validate {
            limit_req zone=validate burst=10 nodelay;

            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ── All other endpoints ───────────────────────────────────────────────
        location / {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ── Block direct access to hidden files (.env, .git, etc.) ───────────
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
