name: CI

on:
  push:
    branches: ["main", "development"]
  pull_request:
    branches: ["main", "development"]

# Cancel in-flight runs for the same branch/PR on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.6.x"

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — Code review / lint / format check
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  review:
    name: "Review – Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dev dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff – lint check
        run: uv run ruff check src/ tests/ main.py

      - name: Ruff – format check
        run: uv run ruff format --check src/ tests/ main.py

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 — Install dependencies & run tests with coverage
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: "Test – Install & Pytest"
    runs-on: ubuntu-latest
    needs: review           # only run tests when lint is clean

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install all dependencies (prod + dev)
        run: uv sync --frozen --all-extras

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

# ─────────────────────────────────────────────────────────────────────────────
# Job 3 — Docker build
# Validates the Dockerfile builds successfully.
# Image is pushed to GHCR only on pushes to main.
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: "Build – Docker Image"
    runs-on: ubuntu-latest
    needs: test             # only build when tests pass

    permissions:
      contents: read
      packages: write       # needed to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Build image (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
